name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      agentation--release_created: ${{ steps.release.outputs['package--release_created'] }}
      agentation--tag_name: ${{ steps.release.outputs['package--tag_name'] }}
      agentation--version: ${{ steps.release.outputs['package--version'] }}
      mcp--release_created: ${{ steps.release.outputs['mcp--release_created'] }}
      mcp--tag_name: ${{ steps.release.outputs['mcp--tag_name'] }}
      mcp--version: ${{ steps.release.outputs['mcp--version'] }}
      extension--release_created: ${{ steps.release.outputs['extension--release_created'] }}
      extension--tag_name: ${{ steps.release.outputs['extension--tag_name'] }}
      extension--version: ${{ steps.release.outputs['extension--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-agentation:
    needs: release-please
    if: ${{ needs.release-please.outputs['agentation--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter agentation publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp:
    needs: release-please
    if: ${{ needs.release-please.outputs['mcp--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter agentation-mcp publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-extension:
    needs: release-please
    if: ${{ needs.release-please.outputs['extension--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter agentation-extension build

      - name: Create extension zip
        run: cd extension/dist && zip -r ../../agentation-extension-${{ needs.release-please.outputs['extension--version'] }}.zip .

      - name: Upload extension zip to GitHub Release
        run: gh release upload ${{ needs.release-please.outputs['extension--tag_name'] }} agentation-extension-${{ needs.release-please.outputs['extension--version'] }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
