name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      extension--release_created: ${{ steps.release.outputs['extension--release_created'] }}
      extension--tag_name: ${{ steps.release.outputs['extension--tag_name'] }}
      extension--version: ${{ steps.release.outputs['extension--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-extension:
    needs: release-please
    if: ${{ needs.release-please.outputs['extension--release_created'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter agentation-extension build

      - name: Create extension zip
        run: cd extension/dist && zip -r ../../agentation-extension-${{ needs.release-please.outputs['extension--version'] }}.zip .

      - name: Build CRX
        run: |
          echo "${{ secrets.CRX_KEY }}" | base64 -d > key.pem
          npx -y crx3 extension/dist -o agentation-extension-${{ needs.release-please.outputs['extension--version'] }}.crx -p key.pem
          rm key.pem

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.release-please.outputs['extension--version'] }}
          TAG=${{ needs.release-please.outputs['extension--tag_name'] }}
          gh release upload "$TAG" \
            "agentation-extension-${VERSION}.zip" \
            "agentation-extension-${VERSION}.crx"
